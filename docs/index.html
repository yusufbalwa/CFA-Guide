// --- Decryption (parameters match encrypt() in summarize.py) ---
function b64ToBytes(b64){ return Uint8Array.from(atob(b64), c => c.charCodeAt(0)); }
async function deriveKey(pin, salt){
  const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(pin), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({ name:"PBKDF2", salt, iterations:200000, hash:"SHA-256" }, baseKey, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
}
async function decryptBriefing(pin){
  const env = await fetch("briefing.json?t=" + Date.now()).then(r => r.json());
  const key = await deriveKey(pin, b64ToBytes(env.salt));
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv: b64ToBytes(env.iv) }, key, b64ToBytes(env.data));
  return JSON.parse(new TextDecoder().decode(plain));
}
function reveal(){
  document.getElementById("gate").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
}
async function tryPin(){
  const pin = document.getElementById("pin").value;
  document.getElementById("pinErr").textContent = "Checking…";
  try { const b = await decryptBriefing(pin); sessionStorage.setItem("pin", pin); reveal(); renderBriefing(b); }
  catch (e) { document.getElementById("pinErr").textContent = "Couldn't unlock — wrong PIN, or no briefing yet."; }
}
document.getElementById("pinBtn").addEventListener("click", tryPin);
document.getElementById("pin").addEventListener("keydown", e => { if (e.key === "Enter") tryPin(); });
(async () => {
  const saved = sessionStorage.getItem("pin");
  if (saved) { try { const b = await decryptBriefing(saved); reveal(); renderBriefing(b); } catch (e) { sessionStorage.removeItem("pin"); } }
})();

function loadCurriculum(){
  const d = loadCFA();
  CFA_TOPICS.forEach(tp => {
    const t = topicState(d, tp.key);
    const have = new Set(t.chapters.map(c => c.name));
    (CFA_CURRICULUM[tp.key]||[]).forEach(name => { if(!have.has(name)) t.chapters.push({ name, done:false }); });
  });
  saveCFA(d); renderTracker();
}

function loadCFA(){ try { return JSON.parse(localStorage.getItem("cfaProgress") || "{}"); } catch(e){ return {}; } }
function saveCFA(d){ try { localStorage.setItem("cfaProgress", JSON.stringify(d)); } catch(e){} }
function topicState(d, key){ if(!d[key]) d[key] = { chapters: [], notes: "" }; return d[key]; }

function toggleCFA(){ document.getElementById("cfaBody").classList.toggle("hidden"); }
function openSSEI(){ window.location.href = SSEI_APP_URL; }

function cfaAdd(key){
  const inp = document.getElementById("add-"+key);
  const name = (inp.value||"").trim();
  if(!name) return;
  const d = loadCFA(); topicState(d, key).chapters.push({ name, done:false }); saveCFA(d);
  inp.value = ""; renderTracker(); document.getElementById("add-"+key).focus();
}
function cfaToggle(key, i){
  const d = loadCFA(); const t = topicState(d, key);
  if(t.chapters[i]){ t.chapters[i].done = !t.chapters[i].done; saveCFA(d); renderTracker(); }
}
function cfaDel(key, i){
  const d = loadCFA(); topicState(d, key).chapters.splice(i,1); saveCFA(d); renderTracker();
}
function cfaNotes(key, val){
  const d = loadCFA(); topicState(d, key).notes = val; saveCFA(d);
}

function renderTracker(){
  const body = document.getElementById("cfaBody");
  if(!body) return;
  if(localStorage.getItem("cfaProgress") === null){
    const seed = {};
    CFA_TOPICS.forEach(tp => seed[tp.key] = { chapters:(CFA_CURRICULUM[tp.key]||[]).map(n=>({name:n, done:false})), notes:"" });
    saveCFA(seed);
  }
  const d = loadCFA();
  let totalDone = 0, totalAll = 0;
  const blocks = CFA_TOPICS.map(tp => {
    const t = d[tp.key] || { chapters: [], notes: "" };
    const done = t.chapters.filter(c => c.done).length;
    const all = t.chapters.length;
    totalDone += done; totalAll += all;
    const pct = all ? Math.round(done/all*100) : 0;
    const chapters = t.chapters.map((c,i) => `
      <div class="flex items-center gap-2 py-1">
        <input type="checkbox" ${c.done?"checked":""} onclick="cfaToggle('${tp.key}',${i})" class="w-4 h-4 accent-indigo-500">
        <span class="flex-1 text-sm ${c.done?'line-through text-gray-400':'text-gray-700 dark:text-gray-200'}">${esc(c.name)}</span>
        <button onclick="cfaDel('${tp.key}',${i})" class="text-gray-300 hover:text-red-500 text-sm px-1">✕</button>
      </div>`).join("");
    return `<details class="border-b border-gray-100 dark:border-gray-700 py-2">
      <summary class="cursor-pointer flex items-center justify-between gap-2">
        <span class="text-sm font-semibold text-gray-800 dark:text-gray-100">${esc(tp.name)} <span class="text-[10px] font-normal text-gray-400">${tp.weight}</span></span>
        <span class="text-[11px] font-semibold text-gray-500 dark:text-gray-400">${done}/${all}</span>
      </summary>
      <div class="mt-1 h-1.5 rounded-full bg-gray-100 dark:bg-gray-700 overflow-hidden"><div class="h-full bg-emerald-500" style="width:${pct}%"></div></div>
      <div class="mt-2">${chapters || '<p class="text-[11px] text-gray-400 py-1">No chapters yet — add the ones you watch in SSEILearn.</p>'}</div>
      <div class="flex gap-2 mt-1">
        <input id="add-${tp.key}" placeholder="Add a chapter/lecture you watched…" class="flex-1 text-sm border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-gray-100 rounded-lg px-2 py-1" onkeydown="if(event.key==='Enter')cfaAdd('${tp.key}')">
        <button onclick="cfaAdd('${tp.key}')" class="text-sm font-semibold text-indigo-600 dark:text-indigo-400 px-2">Add</button>
      </div>
      <input value="${esc(t.notes||'').replace(/"/g,'&quot;')}" placeholder="Notes for this topic…" onchange="cfaNotes('${tp.key}', this.value)" class="w-full mt-2 text-[13px] text-gray-600 dark:text-gray-300 bg-gray-50 dark:bg-gray-700/50 rounded-lg px-2 py-1 border border-transparent focus:border-indigo-300 focus:outline-none">
    </details>`;
  }).join("");
  const overall = totalAll ? Math.round(totalDone/totalAll*100) : 0;
  document.getElementById("cfaPercent").textContent = overall + "%  (" + totalDone + "/" + totalAll + ")";
  document.getElementById("cfaBar").style.width = overall + "%";
  body.innerHTML = `
    <div class="flex gap-2 mb-3">
      <button onclick="openSSEI()" class="flex-1 bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-semibold rounded-xl py-2">▶ Open SSEILearn</button>
      <button onclick="loadCurriculum()" class="flex-1 bg-gray-100 dark:bg-gray-700 text-gray-700 dark:text-gray-200 text-sm font-semibold rounded-xl py-2">↻ Load CFA curriculum</button>
    </div>
    ${blocks}
    <p class="text-[10px] text-gray-400 mt-3 leading-snug">🔒 Your progress lives only in this browser on this device — it's never uploaded, never written to the public page, and the lectures stay inside the SSEILearn app.</p>`;
}

// --- Rendering ---
const tagColor = t => ({Important:"bg-red-100 text-red-700",Update:"bg-amber-100 text-amber-700",Material:"bg-blue-100 text-blue-700"}[t]||"bg-gray-100 text-gray-600");
const esc = s => (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function stat(n,l,c,extra){return `<div ${extra||""} class="bg-white dark:bg-gray-800 rounded-xl border border-gray-100 dark:border-gray-700 px-3 py-3 text-center shadow-sm"><div class="text-xl font-bold ${c}">${n}</div><div class="text-[11px] text-gray-500 dark:text-gray-400 mt-0.5">${l}</div></div>`;}

function buildTodos(b){
  const todos = [];
  (b.groups||[]).forEach(g => (g.actions||[]).forEach(a => todos.push(Object.assign({}, a, {group:g.name, icon:g.icon}))));
  todos.sort((x,y) => (x.dueDate||"9999-12-31").localeCompare(y.dueDate||"9999-12-31"));
  if(!todos.length) return `<p class="text-sm text-gray-400 dark:text-gray-500 text-center py-4">No homework due right now 🎉</p>`;
  return todos.map(t => `<div class="flex items-start gap-3 py-2.5 border-b border-gray-100 dark:border-gray-700 last:border-0">
      <span class="shrink-0 text-[11px] font-semibold px-2 py-1 rounded-lg ${t.urgent?'bg-red-100 text-red-600':'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}">${t.urgent?'⚠ ':''}${esc(t.due)}</span>
      <div class="flex-1 min-w-0">
        <p class="text-sm text-gray-700 dark:text-gray-200 leading-snug">${esc(t.text)}</p>
        <p class="text-[11px] text-gray-400 dark:text-gray-500 mt-0.5">${esc(t.icon||"")} ${esc(t.group)}</p>
      </div>
    </div>`).join("");
}

function card(g){
  const empty = !(g.highlights?.length||g.actions?.length||g.links?.length||g.log?.length);
  const highlights = (g.highlights||[]).map(h=>`
    <div class="flex gap-3 items-start mb-2">
      <span class="shrink-0 mt-0.5 w-5 h-5 rounded-full bg-indigo-500 text-white text-xs font-bold flex items-center justify-center">${h.rank||"•"}</span>
      <div><p class="text-sm text-gray-700 dark:text-gray-200 leading-snug">${esc(h.text)}</p>
      <span class="inline-block mt-1 text-[10px] font-semibold px-2 py-0.5 rounded-full ${tagColor(h.tag)}">${esc(h.tag)}</span></div>
    </div>`).join("");
  const actions = (g.actions||[]).map(a=>`
    <div class="flex items-start gap-3 bg-gray-50 dark:bg-gray-700/50 rounded-xl px-3 py-2.5 mb-2">
      <p class="flex-1 text-sm text-gray-700 dark:text-gray-200 leading-snug">${esc(a.text)}</p>
      <span class="shrink-0 text-[11px] font-semibold px-2 py-1 rounded-lg ${a.urgent?'bg-red-100 text-red-600':'bg-gray-200 dark:bg-gray-600 text-gray-600 dark:text-gray-200'}">${a.urgent?'⚠ ':''}${esc(a.due)}</span>
    </div>`).join("");
  const links = (g.links||[]).map(l=>`<a href="${esc(l.url)}" target="_blank" rel="noopener" class="flex items-center gap-2 text-sm text-blue-600 dark:text-blue-400 hover:underline mb-1.5">🔗 <span class="truncate">${esc(l.label)}</span></a>`).join("");
  const log = (g.log||[]).map(m=>`<div class="pl-3 mb-3"><span class="text-[11px] font-medium text-gray-400 dark:text-gray-500">${esc(m.time)}</span><p class="text-sm text-gray-700 dark:text-gray-200 leading-snug">${esc(m.text)}</p></div>`).join("");
  const sec=(title,body)=> body?`<div class="mb-5"><h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wide mb-2.5">${title}</h3>${body}</div>`:"";
  return `<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mb-5">
    <div class="px-5 pt-5 pb-4 border-b border-gray-100 dark:border-gray-700 bg-gradient-to-r from-indigo-50 to-white dark:from-gray-800 dark:to-gray-800 flex items-center justify-between">
      <h2 class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2 min-w-0"><span class="text-2xl">${g.icon||"💬"}</span><span class="truncate">${esc(g.name)}</span></h2>
      <span class="shrink-0 text-xs font-medium text-indigo-500 bg-indigo-50 dark:bg-indigo-900/40 px-2.5 py-1 rounded-full">${g.msgCount||0} msgs</span>
    </div>
    <div class="px-5 py-4">
      ${empty ? '<p class="text-sm text-gray-400 dark:text-gray-500 py-4 text-center">No new messages in the last 24 hours.</p>' : ""}
      ${sec("📌 Top Highlights", highlights)}
      ${sec("✅ Action Items & Homework", actions)}
      ${sec("🔗 Links & Materials", links)}
      ${log ? `<details class="pt-1"><summary class="cursor-pointer text-sm font-semibold text-gray-600 dark:text-gray-300">🗣️ Full message log (${g.log.length})</summary><div class="mt-3 border-l-2 border-gray-100 dark:border-gray-700">${log}</div></details>` : ""}
    </div></div>`;
}

function newsItem(n, last){
  const region = (n.region||"").toLowerCase().includes("india")
    ? '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-orange-100 text-orange-700">🇮🇳 India</span>'
    : '<span class="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-sky-100 text-sky-700">🌍 World</span>';
  const sc = n.scores || {};
  const ov = (typeof n.overall === "number") ? n.overall.toFixed(1) : esc(String(n.overall||""));
  return `<div class="py-3 ${last ? '' : 'border-b border-gray-100 dark:border-gray-700'}">
    <div class="flex gap-3 items-start">
      <div class="shrink-0 w-9 text-center">
        <div class="text-base font-bold text-indigo-600 dark:text-indigo-400">${ov}</div>
        <div class="text-[9px] text-gray-400 -mt-0.5">score</div>
      </div>
      <div class="flex-1 min-w-0">
        <a href="${esc(n.url)}" target="_blank" rel="noopener" class="text-sm font-semibold text-gray-800 dark:text-gray-100 hover:text-indigo-600 dark:hover:text-indigo-400 leading-snug">${esc(n.headline)}</a>
        <div class="flex items-center gap-2 mt-1 flex-wrap">${region}<span class="text-[10px] text-gray-400 dark:text-gray-500">${esc(n.source)}</span></div>
        <p class="text-sm text-gray-600 dark:text-gray-300 leading-snug mt-1">${esc(n.summary)}</p>
        <div class="flex items-center justify-between mt-1.5">
          <div class="flex gap-3 text-[10px] font-semibold text-gray-500 dark:text-gray-400">
            <span title="Virality">🔥 ${sc.virality ?? "–"}</span>
            <span title="Credibility">✓ ${sc.credibility ?? "–"}</span>
            <span title="Importance">★ ${sc.importance ?? "–"}</span>
          </div>
          <a href="${esc(n.url)}" target="_blank" rel="noopener" class="text-[11px] font-semibold text-blue-600 dark:text-blue-400 hover:underline">Read →</a>
        </div>
      </div>
    </div>
  </div>`;
}

function newsSection(title, items){
  if(!items.length) return "";
  const rows = items.map((n,i) => newsItem(n, i === items.length-1)).join("");
  return `<div><h3 class="text-xs font-bold text-emerald-700 dark:text-emerald-400 uppercase tracking-wide pt-3 pb-1">${title}</h3>${rows}</div>`;
}

function renderNews(news){
  let body;
  if(!news || !news.length){
    body = `<p class="text-sm text-gray-400 dark:text-gray-500 text-center py-6">No financial news today.</p>`;
  } else {
    const byScore = (a,b) => (b.overall||0) - (a.overall||0);
    const fintech = news.filter(n => (n.category||"").toLowerCase().includes("fintech")).sort(byScore);
    const finance = news.filter(n => !(n.category||"").toLowerCase().includes("fintech")).sort(byScore);
    if(!fintech.length && !finance.length){
      body = news.map((n,i) => newsItem(n, i === news.length-1)).join("");
    } else {
      body = newsSection("💳 Top Fintech", fintech) + newsSection("📊 Top Finance", finance);
    }
  }
  return `<div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mb-5">
    <div class="px-5 pt-5 pb-4 border-b border-gray-100 dark:border-gray-700 bg-gradient-to-r from-emerald-50 to-white dark:from-gray-800 dark:to-gray-800 flex items-center justify-between">
      <h2 class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2"><span class="text-2xl">🌍</span> Financial News</h2>
      <span class="shrink-0 text-xs font-medium text-emerald-600 bg-emerald-50 dark:bg-emerald-900/40 px-2.5 py-1 rounded-full">ranked</span>
    </div>
    <div class="px-5 py-2">${body}</div>
  </div>`;
}

function renderBriefing(b){
  const totalMsgs = b.groups.reduce((s,g)=>s+(g.msgCount||0),0);
  const totalActions = b.groups.reduce((s,g)=>s+((g.actions||[]).length),0);
  const isDark = document.documentElement.classList.contains('dark');
  document.getElementById("app").innerHTML = `
    <div class="flex items-start justify-between mb-6">
      <div>
        <h1 class="text-xl font-bold text-gray-800 dark:text-gray-100">🎓 CFA Guide</h1>
        <div class="text-sm text-gray-500 dark:text-gray-400 mt-1">📅 ${esc(b.dateLabel)} · <span class="text-emerald-600 dark:text-emerald-400">🕘 Updated ${esc(b.generatedAt)}</span></div>
      </div>
      <button onclick="toggleTheme()" class="shrink-0 w-9 h-9 rounded-full bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 flex items-center justify-center shadow-sm"><span class="theme-icon text-base">${isDark ? '☀️' : '🌙'}</span></button>
    </div>
    <div class="grid grid-cols-3 gap-3 mb-6">
      ${stat(b.groups.length,"Groups","text-indigo-600 dark:text-indigo-400")}
      ${stat(totalMsgs,"Messages","text-gray-700 dark:text-gray-200")}
      ${stat(totalActions,"To-dos · tap","text-emerald-600 dark:text-emerald-400",'onclick="toggleTodos()" style="cursor:pointer"')}
    </div>
    <div id="todoPanel" class="hidden bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 px-5 py-3 mb-6">
      <h3 class="text-sm font-semibold text-gray-700 dark:text-gray-300 uppercase tracking-wide mb-1">📋 All Homework — by deadline</h3>
      ${buildTodos(b)}
    </div>
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mb-6">
      <button onclick="toggleCFA()" class="w-full text-left px-5 py-4">
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-base font-bold text-gray-800 dark:text-gray-100 flex items-center gap-2">📚 CFA Level 1 Progress</h2>
          <span id="cfaPercent" class="text-sm font-bold text-indigo-600 dark:text-indigo-400">0%</span>
        </div>
        <div class="mt-2 h-2 rounded-full bg-gray-100 dark:bg-gray-700 overflow-hidden"><div id="cfaBar" class="h-full bg-indigo-500 transition-all" style="width:0%"></div></div>
        <div class="mt-1 text-[11px] text-gray-400">tap to expand · tracked privately on this device</div>
      </button>
      <div id="cfaBody" class="hidden px-5 pb-4"></div>
    </div>
    <div class="grid md:grid-cols-2 gap-5 items-start">
      <div>${b.groups.map(card).join("")}</div>
      <div>${renderNews(b.news)}</div>
    </div>
    <p class="text-center text-[11px] text-gray-400 mt-2 mb-6">Auto-refreshes each morning at 9 AM</p>`;
  renderTracker();
}
</script>
</body>
</html>
